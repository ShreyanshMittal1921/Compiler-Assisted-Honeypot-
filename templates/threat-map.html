<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Honeypot — Live Threat Map</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #050507;
      --panel: #0c0c10;
      --panel2: #0f0f14;
      --border: #1a1a24;
      --border-hi: #2a2a3a;
      --red: #ff2d55;
      --red-dim: rgba(255, 45, 85, 0.1);
      --amber: #ff9500;
      --blue: #0af;
      --green: #30d158;
      --text: #e8e8f0;
      --muted: #44445a;
      --mono: 'Share Tech Mono', monospace;
      --display: 'Bebas Neue', sans-serif;
      --body: 'DM Sans', sans-serif;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      overflow: hidden
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, 0.06) 2px, rgba(0, 0, 0, 0.06) 4px);
      pointer-events: none;
      z-index: 0
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh
    }

    body.stealth {
      --bg: #020204;
      --panel: #07070a;
      --border: #111118
    }

    /* NAV */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: rgba(5, 5, 7, 0.9);
      backdrop-filter: blur(12px);
      flex-shrink: 0;
      z-index: 10
    }

    .nav-left {
      display: flex;
      align-items: center;
      gap: 20px
    }

    .nav-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none
    }

    .nav-logo {
      width: 28px;
      height: 28px;
      border: 1px solid var(--red);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--display);
      font-size: 14px;
      color: var(--red)
    }

    .nav-title {
      font-family: var(--display);
      font-size: 18px;
      letter-spacing: 0.1em;
      color: var(--text)
    }

    .nav-links {
      display: flex;
      gap: 0
    }

    .nav-link {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 2px;
      cursor: pointer;
      transition: color 0.15s;
      text-decoration: none;
      border: 1px solid transparent
    }

    .nav-link:hover {
      color: var(--text)
    }

    .nav-link.active {
      color: var(--red);
      border-color: rgba(255, 45, 85, 0.2);
      background: var(--red-dim)
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .nav-user {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      padding: 4px 10px;
      border: 1px solid var(--border);
      border-radius: 2px
    }

    .nav-user span {
      color: var(--text)
    }

    .stealth-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 5px 12px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--muted);
      transition: all 0.2s
    }

    .stealth-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.2s
    }

    body.stealth .stealth-dot {
      background: var(--green);
      box-shadow: 0 0 6px var(--green)
    }

    body.stealth .stealth-btn {
      border-color: rgba(48, 209, 88, 0.3);
      color: var(--green)
    }

    .logout-btn {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.1em;
      color: var(--muted);
      padding: 5px 12px;
      border: 1px solid var(--border);
      border-radius: 2px;
      background: transparent;
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px
    }

    .logout-btn:hover {
      border-color: var(--red);
      color: var(--red);
      background: var(--red-dim)
    }

    /* BODY */
    .body {
      display: flex;
      flex: 1;
      overflow: hidden
    }

    .sidebar {
      width: 270px;
      border-right: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      overflow: hidden
    }

    .sidebar-section {
      border-bottom: 1px solid var(--border);
      padding: 14px 16px
    }

    .sidebar-title {
      font-family: var(--display);
      font-size: 12px;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 10px
    }

    .feed {
      flex: 1;
      overflow-y: auto;
      padding: 10px
    }

    .feed::-webkit-scrollbar {
      width: 3px
    }

    .feed::-webkit-scrollbar-track {
      background: transparent
    }

    .feed::-webkit-scrollbar-thumb {
      background: var(--border)
    }

    .feed-item {
      display: flex;
      align-items: flex-start;
      gap: 9px;
      padding: 7px 5px;
      border-bottom: 1px solid rgba(26, 26, 36, 0.5);
      animation: feedIn 0.4s ease both
    }

    @keyframes feedIn {
      from {
        opacity: 0;
        transform: translateX(-8px)
      }

      to {
        opacity: 1;
        transform: translateX(0)
      }
    }

    .feed-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 3px
    }

    .feed-dot.sql {
      background: var(--red);
      box-shadow: 0 0 4px var(--red)
    }

    .feed-dot.path {
      background: var(--amber);
      box-shadow: 0 0 4px var(--amber)
    }

    .feed-dot.sus {
      background: var(--blue);
      box-shadow: 0 0 4px var(--blue)
    }

    .feed-ip {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text)
    }

    .feed-meta {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      margin-top: 2px
    }

    .stat-tile {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 7px
    }

    .st-label {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.08em
    }

    .st-val {
      font-family: var(--display);
      font-size: 20px
    }

    .st-val.r {
      color: var(--red)
    }

    .st-val.a {
      color: var(--amber)
    }

    .st-val.b {
      color: var(--blue)
    }

    .country-item {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 7px
    }

    .country-name {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      width: 48px
    }

    .country-bar-wrap {
      flex: 1;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden
    }

    .country-bar-fill {
      height: 100%;
      background: var(--red);
      border-radius: 2px;
      transition: width 1s
    }

    .country-count {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--red);
      width: 26px;
      text-align: right
    }

    /* MAP */
    .map-area {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #050507
    }

    #worldMap {
      width: 100%;
      height: 100%
    }

    .live-badge {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      background: rgba(5, 5, 7, 0.82);
      border: 1px solid rgba(255, 45, 85, 0.3);
      border-radius: 2px;
      padding: 5px 12px;
      backdrop-filter: blur(8px)
    }

    .live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--red);
      box-shadow: 0 0 6px var(--red);
      animation: pulse 1.2s ease-in-out infinite
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.2
      }
    }

    .live-text {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--red);
      letter-spacing: 0.1em
    }

    .live-count {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text)
    }

    .map-stats {
      position: absolute;
      bottom: 18px;
      left: 18px;
      display: flex;
      gap: 10px
    }

    .map-stat {
      background: rgba(5, 5, 7, 0.82);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 7px 12px;
      backdrop-filter: blur(8px)
    }

    .ms-l {
      font-family: var(--mono);
      font-size: 8px;
      color: var(--muted);
      letter-spacing: 0.1em
    }

    .ms-v {
      font-family: var(--display);
      font-size: 20px
    }

    .ms-v.r {
      color: var(--red)
    }

    .ms-v.a {
      color: var(--amber)
    }

    .ms-v.b {
      color: var(--blue)
    }

    .statusbar {
      border-top: 1px solid var(--border);
      padding: 7px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      flex-shrink: 0
    }

    .si {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.08em
    }

    .si span {
      color: var(--text)
    }
  body.light {
  --bg: #f4f4f8;
  --panel: #ffffff;
  --panel2: #f8f9fa;
  --border: #e2e2e8;
  --border-hi: #c4c4cc;
  --text: #1a1a24;
  --muted: #66667a;
}
body.light .nav {
  background: rgba(244, 244, 248, 0.88);
}
</style>
</head>

<body>
  <div class="app">
    <nav class="nav">
      <div class="nav-left">
        <a href="/" class="nav-brand">
          <div class="nav-logo">H</div>
          <div class="nav-title">HONEYPOT</div>
        </a>
        <div class="nav-links">
          <a class="nav-link" href="/">COMPILER</a>
          <a class="nav-link" href="/dashboard">MONITOR</a>
          <a class="nav-link" href="/analytics">ANALYTICS</a>
          <a class="nav-link active" href="/threat-map">THREAT MAP</a>
        </div>
      </div>
      <div class="nav-right">
        <button class="nav-link" style="border:1px solid var(--border); background:transparent;" onclick="toggleTheme()" id="themeBtn">☀ LIGHT</button>
        <div class="nav-clock" id="clock">--:--:--</div>
        <div class="nav-user">OP: <span id="navUser">—</span></div>
        <button class="stealth-btn" onclick="document.body.classList.toggle('stealth')">
          <div class="stealth-dot"></div>STEALTH
        </button>
        <a class="logout-btn" href="/logout">⏻ SIGN OUT</a>
      </div>
    </nav>

    <div class="body">
      <div class="sidebar">
        <div class="sidebar-section">
          <div class="sidebar-title">ATTACK STATS</div>
          <div class="stat-tile"><span class="st-label">SQL INJECTION</span><span class="st-val r" id="ss1">0</span>
          </div>
          <div class="stat-tile"><span class="st-label">PATH TRAVERSAL</span><span class="st-val a" id="ss2">0</span>
          </div>
          <div class="stat-tile"><span class="st-label">SUSPICIOUS</span><span class="st-val b" id="ss3">0</span></div>
        </div>
        <div class="sidebar-section">
          <div class="sidebar-title">TOP SOURCES</div>
          <div id="countryList"></div>
        </div>
        <div class="sidebar-section" style="flex-shrink:0">
          <div class="sidebar-title">LIVE FEED</div>
        </div>
        <div class="feed" id="liveFeed"></div>
      </div>

      <div class="map-area">
        <svg id="worldMap" viewBox="0 0 1000 500" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <radialGradient id="bgGrad" cx="50%" cy="50%">
              <stop offset="0%" style="stop-color:#0a0a12" />
              <stop offset="100%" style="stop-color:#050507" />
            </radialGradient>
            <filter id="glow">
              <feGaussianBlur stdDeviation="3" result="blur" />
              <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
              </feMerge>
            </filter>
          </defs>
          <rect width="1000" height="500" fill="url(#bgGrad)" />
          <path
            d="M 120 80 L 280 70 L 300 90 L 320 120 L 310 160 L 280 190 L 240 220 L 200 240 L 170 260 L 150 250 L 130 220 L 110 180 L 100 140 L 110 110 Z"
            fill="#111120" stroke="#1e1e30" stroke-width="0.5" />
          <path d="M 200 240 L 220 260 L 210 290 L 195 285 L 185 265 Z" fill="#111120" stroke="#1e1e30"
            stroke-width="0.5" />
          <path
            d="M 210 300 L 260 290 L 290 310 L 300 360 L 280 420 L 250 450 L 220 440 L 200 400 L 195 350 L 200 320 Z"
            fill="#111120" stroke="#1e1e30" stroke-width="0.5" />
          <path d="M 440 70 L 500 65 L 520 80 L 510 100 L 490 110 L 470 130 L 450 120 L 435 100 Z" fill="#111120"
            stroke="#1e1e30" stroke-width="0.5" />
          <path d="M 460 45 L 480 40 L 500 50 L 495 70 L 470 75 L 455 65 Z" fill="#111120" stroke="#1e1e30"
            stroke-width="0.5" />
          <path
            d="M 450 140 L 510 135 L 540 160 L 545 220 L 530 290 L 500 340 L 470 340 L 450 310 L 435 260 L 430 200 L 440 160 Z"
            fill="#111120" stroke="#1e1e30" stroke-width="0.5" />
          <path d="M 520 110 L 570 105 L 580 140 L 555 155 L 530 150 L 515 130 Z" fill="#111120" stroke="#1e1e30"
            stroke-width="0.5" />
          <path d="M 510 50 L 750 40 L 780 60 L 760 90 L 700 100 L 620 95 L 550 90 L 520 80 Z" fill="#111120"
            stroke="#1e1e30" stroke-width="0.5" />
          <path d="M 580 80 L 720 75 L 760 100 L 750 160 L 720 200 L 680 210 L 640 200 L 600 190 L 570 160 L 560 120 Z"
            fill="#111120" stroke="#1e1e30" stroke-width="0.5" />
          <path d="M 610 180 L 640 175 L 650 200 L 640 240 L 620 250 L 605 230 L 600 200 Z" fill="#111120"
            stroke="#1e1e30" stroke-width="0.5" />
          <path d="M 700 190 L 740 185 L 760 200 L 750 230 L 720 240 L 700 225 L 695 205 Z" fill="#111120"
            stroke="#1e1e30" stroke-width="0.5" />
          <path d="M 710 110 L 790 100 L 820 130 L 810 170 L 775 185 L 740 180 L 710 160 L 700 130 Z" fill="#111120"
            stroke="#1e1e30" stroke-width="0.5" />
          <path d="M 830 120 L 850 115 L 860 135 L 845 150 L 830 145 Z" fill="#111120" stroke="#1e1e30"
            stroke-width="0.5" />
          <path d="M 740 310 L 840 300 L 870 340 L 860 390 L 820 410 L 770 400 L 740 370 L 730 340 Z" fill="#111120"
            stroke="#1e1e30" stroke-width="0.5" />
          <line x1="0" y1="250" x2="1000" y2="250" stroke="#1a1a28" stroke-width="0.5" stroke-dasharray="4,8" />
          <line x1="500" y1="0" x2="500" y2="500" stroke="#1a1a28" stroke-width="0.5" stroke-dasharray="4,8" />
          <!-- TARGET (our honeypot) -->
          <circle cx="200" cy="160" r="8" fill="none" stroke="#ff2d55" stroke-width="1" opacity="0.6">
            <animate attributeName="r" values="8;16;8" dur="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.6;0;0.6" dur="2s" repeatCount="indefinite" />
          </circle>
          <circle cx="200" cy="160" r="4" fill="#ff2d55" filter="url(#glow)" />
          <g id="arcLayer"></g>
          <g id="dotLayer"></g>
        </svg>
        <div class="live-badge">
          <div class="live-dot"></div><span class="live-text">LIVE</span><span class="live-count" id="liveCount">0
            ATTACKS</span>
        </div>
        <div class="map-stats">
          <div class="map-stat">
            <div class="ms-l">ACTIVE THREATS</div>
            <div class="ms-v r" id="mapTotal">0</div>
          </div>
          <div class="map-stat">
            <div class="ms-l">ARCS / 30s</div>
            <div class="ms-v a" id="mapRate">0</div>
          </div>
          <div class="map-stat">
            <div class="ms-l">SOURCE COUNTRIES</div>
            <div class="ms-v b" id="mapCountries">0</div>
          </div>
        </div>
      </div>
    </div>

    <div class="statusbar">
      <div style="display:flex;gap:20px">
        <div class="si">ENGINE <span>HONEYPOT v2.4</span></div>
        <div class="si">TARGET <span>192.168.0.1 (HONEYPOT)</span></div>
      </div>
      <div style="display:flex;gap:20px">
        <div class="si">UPTIME <span id="uptime">00:00:00</span></div>
        <div class="si">OP <span id="navUser2">—</span></div>
      </div>
    </div>
  </div>

  <script>
    fetch('/whoami').then(r => r.json()).then(d => { if (d.user) { document.getElementById('navUser').textContent = d.user.toUpperCase(); document.getElementById('navUser2').textContent = d.user.toUpperCase() } }).catch(() => { });
    const sources = [[480, 95, 'RUSSIA'], [730, 140, 'CHINA'], [620, 200, 'INDIA'], [490, 105, 'UKRAINE'], [560, 130, 'IRAN'], [820, 150, 'JAPAN'], [745, 325, 'AUSTRALIA'], [250, 310, 'BRAZIL'], [530, 75, 'GERMANY'], [520, 90, 'FRANCE'], [700, 210, 'THAILAND'], [390, 135, 'ALGERIA'], [150, 140, 'USA'], [540, 170, 'SAUDI'], [760, 175, 'KOREA']];
    const TARGET = { x: 200, y: 160 };
    const types = [{ cls: 'sql', label: 'SQL INJECTION', color: '#ff2d55' }, { cls: 'path', label: 'PATH TRAVERSAL', color: '#ff9500' }, { cls: 'sus', label: 'SUSPICIOUS', color: '#0af' }];
    const countries = {}; sources.forEach(s => countries[s[2]] = 0);
    let totalSql = 0, totalPath = 0, totalSus = 0, totalAtks = 0, arcCount = 0, startTime = Date.now();
    function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a }
    function spawnArc() {
      const src = sources[ri(0, sources.length - 1)]; const type = types[ri(0, 2)];
      const svg = document.getElementById('arcLayer');
      const cx = (src[0] + TARGET.x) / 2 + ri(-40, 40); const cy = Math.min(src[1], TARGET.y) - ri(60, 140);
      const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      const d = `M ${src[0]} ${src[1]} Q ${cx} ${cy} ${TARGET.x} ${TARGET.y}`;
      path.setAttribute('d', d); path.setAttribute('stroke', type.color); path.setAttribute('stroke-width', '1.2'); path.setAttribute('fill', 'none'); path.setAttribute('opacity', '0.7');
      const len = 600; path.style.strokeDasharray = len; path.style.strokeDashoffset = len; path.style.transition = `stroke-dashoffset 1.6s cubic-bezier(0.4,0,0.2,1)`; svg.appendChild(path);
      setTimeout(() => path.style.strokeDashoffset = 0, 20);
      const dotSvg = document.getElementById('dotLayer'); const dot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      dot.setAttribute('cx', src[0]); dot.setAttribute('cy', src[1]); dot.setAttribute('r', '3'); dot.setAttribute('fill', type.color); dot.setAttribute('filter', 'url(#glow)'); dotSvg.appendChild(dot);
      totalAtks++;
      if (type.cls === 'sql') totalSql++; else if (type.cls === 'path') totalPath++; else totalSus++;
      countries[src[2]] = (countries[src[2]] || 0) + 1; arcCount++;
      updateStats(type); addFeedItem(src, type);
      setTimeout(() => { path.style.opacity = '0'; setTimeout(() => { path.remove(); dot.remove() }, 500) }, 2000);
    }
    function updateStats(type) {
      document.getElementById('ss1').textContent = totalSql; document.getElementById('ss2').textContent = totalPath; document.getElementById('ss3').textContent = totalSus;
      document.getElementById('mapTotal').textContent = totalAtks; document.getElementById('liveCount').textContent = totalAtks + ' ATTACKS';
      const sorted = Object.entries(countries).sort((a, b) => b[1] - a[1]).slice(0, 5); const max = sorted[0]?.[1] || 1;
      document.getElementById('mapCountries').textContent = sorted.filter(c => c[1] > 0).length;
      document.getElementById('countryList').innerHTML = sorted.filter(c => c[1] > 0).map(([name, count]) => `
    <div class="country-item"><div class="country-name">${name}</div>
    <div class="country-bar-wrap"><div class="country-bar-fill" style="width:${(count / max * 100).toFixed(0)}%"></div></div>
    <div class="country-count">${count}</div></div>`).join('');
    }
    function addFeedItem(src, type) {
      const feed = document.getElementById('liveFeed');
      const ip = `${ri(1, 254)}.${ri(0, 255)}.${ri(0, 255)}.${ri(1, 254)}`;
      const item = document.createElement('div'); item.className = 'feed-item';
      item.innerHTML = `<div class="feed-dot ${type.cls}"></div><div><div class="feed-ip">${ip}</div><div class="feed-meta">${src[2]} · ${type.label}</div></div>`;
      feed.insertBefore(item, feed.firstChild);
      while (feed.children.length > 30) feed.removeChild(feed.lastChild);
    }
    setInterval(() => { document.getElementById('mapRate').textContent = arcCount * 2; arcCount = 0 }, 30000);
    setInterval(() => { const s = Math.floor((Date.now() - startTime) / 1000); const h = String(Math.floor(s / 3600)).padStart(2, '0'); const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0'); const sec = String(s % 60).padStart(2, '0'); document.getElementById('uptime').textContent = `${h}:${m}:${sec}` }, 1000);
    function scheduleArc() { spawnArc(); setTimeout(scheduleArc, ri(600, 2000)) }
    setTimeout(scheduleArc, 800);
    for (let i = 0; i < 5; i++)setTimeout(spawnArc, i * 300);
  function toggleTheme() {
  const isLight = document.body.classList.toggle('light');
  localStorage.setItem('theme', isLight ? 'light' : 'dark');
  const btn = document.getElementById('themeBtn');
  if (btn) btn.innerHTML = isLight ? '☾ DARK' : '☀ LIGHT';
}
if (localStorage.getItem('theme') === 'light') {
  document.body.classList.add('light');
  const btn = document.getElementById('themeBtn');
  if (btn) btn.innerHTML = '☾ DARK';
}
</script>
